name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: tests / Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # PySide6 needs a handful of Qt platform libs on a barebones
      # runner. Tests run with QT_QPA_PLATFORM=offscreen so we don't
      # need an X server, but the .so files still have to load.
      - name: Install Qt platform libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1

      - name: Install redx + dev deps
        run: pip install -e '.[dev]'

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  security:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audit tools
        run: pip install bandit pip-audit ruff

      - name: Install redx (so pip-audit walks the right env)
        run: pip install -e .

      - name: Bandit (Python static security)
        run: bandit -q -r redx scripts

      - name: Ruff (project lint + Security ruleset)
        run: ruff check

      - name: pip-audit (CVE check on deps)
        # Upgrade pip first so CVE-2026-6357 (fixed in 26.1) drops out.
        # CVE-2026-3219 is in pip itself with no upstream fix yet -
        # track it but don't let it block redx's own audits. Re-evaluate
        # whenever pip ships a fix and remove the --ignore-vuln then.
        run: |
          pip install --upgrade pip
          pip-audit --skip-editable --ignore-vuln CVE-2026-3219

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck install.sh uninstall.sh packaging/build_appimage.sh

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: redx-wheel
          path: dist/*.whl
          if-no-files-found: error
